# Build and deploy this Hugo site to GitHub Pages.
# In the repo: Settings → Pages → Build and deployment → Source: GitHub Actions.
name: Build & Deploy Hugo site to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# GITHUB_TOKEN needs id-token + pages scopes for OIDC deploy-pages.
permissions:
  contents: read
  id-token: write
  pages: write

# Serialize Pages deploys; do not cancel in-progress runs so a deploy can finish.
concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      # Keep go-version aligned with go.mod / your local toolchain.
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          # renovate: datasource=github-tags depName=golang/go
          go-version: "1.23.3"

      # Extended Hugo is required for some themes/pipes; align hugo-version with local installs.
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          # renovate: datasource=github-releases depName=gohugoio/hugo
          hugo-version: "0.138.0"
          extended: true

      - name: Build
        run: hugo --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      # Populated by deploy-pages; typically https://<owner>.github.io/<repo>/ for project sites.
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
